[pytest]
# Repo-level pytest config for oi-v2.
# Main goal: root-level `pytest` should not descend into the read-only oi-v1
# reference tree, whose firmware tests require MicroPython-only modules.
#
# For a clean all-v2 test run from repo root, use `python3 runtests.py`.
# That executes each subproject in isolation and avoids pytest import/package
# collisions between sibling `tests/` trees.
addopts =
    --ignore=oi-v1
norecursedirs =
    oi-v1
    .git
    .venv
    .pytest_cache
    .run
asyncio_mode = auto
